<section class="film-card" @fadeIn>
  <div class="left">
    <div class="poster-large">Poster placeholder</div>
  </div>
  <div class="right">
    <h2>{{ film.title }}</h2>
    <p class="muted">Directed by {{ film.director }} • {{ film.year }}</p>
    <p class="synopsis">{{ film.synopsis }}</p>
  </div>
</section>
