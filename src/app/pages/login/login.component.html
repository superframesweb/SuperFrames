<div class="login-wrap" @fadeIn>
  <div class="card login-card" role="form" aria-label="Login form">
    <h2>Login</h2>
    <p class="muted">Sign in to manage or read scripts</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-row">
        <label for="username">Username</label>
        <input id="username" formControlName="username" autocomplete="username" />
      </div>

      <div class="form-row">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
      </div>

      <div *ngIf="error() as err" class="error" @errorFade>{{ err }}</div>

      <div class="actions">
        <button class="btn" type="submit" [disabled]="loading()">Sign in</button>
      </div>
    </form>
  </div>
</div>
